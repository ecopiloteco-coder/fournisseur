name: CI/CD - Fournisseur

on:
  push:
    branches: [ '**' ]
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: echo "tag=1.0.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Linter
        run: npm run lint 2>/dev/null || echo "No lint script found"
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test 2>/dev/null || echo "No test script found"
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  sonarqube:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          npm install -g sonar-scanner
          sonar-scanner \
            -Dsonar.projectKey=fournisseur \
            -Dsonar.projectName='Fournisseur' \
            -Dsonar.sources=src \
            -Dsonar.exclusions=**/*.test.ts,**/*.test.tsx,node_modules/** \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN
        continue-on-error: true

  build_and_push:
    runs-on: ubuntu-latest
    needs: [gitleaks, prepare]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan dependencies - Soft
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'package.json'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
        continue-on-error: true

      - name: Login Nexus Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NEXUS_REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            registry.eco-pilot.com/fournisseur:${{ env.IMAGE_TAG }}
            registry.eco-pilot.com/fournisseur:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Scan Docker Image - Soft
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'image'
          image-ref: 'registry.eco-pilot.com/fournisseur:${{ env.IMAGE_TAG }}'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
        continue-on-error: true

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare, build_and_push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core
          ansible-galaxy collection install -r ansible/requirements.yml
      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      - name: Add target host to known_hosts
        shell: bash
        run: |
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      - name: Create Ansible inventory
        shell: bash
        run: |
          cat > ansible/inventory.ini <<EOF
          [ecopilot_servers]
          prod ansible_host=${{ secrets.VPS_HOST }} ansible_user=${{ secrets.VPS_USER }} ansible_port=${{ secrets.VPS_PORT || '22' }} ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF
      - name: Create Ansible CI vars
        shell: bash
        run: |
          cat > ansible/ci-vars.yml <<EOF
          docker_image_tag: "${{ needs.prepare.outputs.image_tag }}"
          service_registry_url: "${{ secrets.NEXUS_REGISTRY }}"
          service_registry_username: "${{ secrets.NEXUS_USERNAME }}"
          service_registry_password: "${{ secrets.NEXUS_PASSWORD }}"
          EOF
      - name: Deploy container
        run: ansible-playbook -i ansible/inventory.ini ansible/playbooks/fournisseur.yml -e @ansible/ci-vars.yml
